# MySQL for the GT06 ingest challenge.
# Development and scoring use the same database setup:
#   docker compose up -d
# Creates database `hackathon` with user hackathon/hackathon123 and loads
# schema.sql automatically on first start.
services:
  mysql:
    image: mysql:8.4
    container_name: hackathon-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hackathon
      MYSQL_USER: hackathon
      MYSQL_PASSWORD: hackathon123
    command: --max-connections=500
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - hackathon-mysql-data:/var/lib/mysql

volumes:
  hackathon-mysql-data:
